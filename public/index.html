<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>项目工作台</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <span class="topbar-title">项目工作台</span>
      <span class="topbar-path" id="project-path">—</span>
    </header>

    <div class="workspace">
      <aside class="sidebar">
        <div class="panel-header">文件</div>
        <div class="file-tree" id="file-tree"></div>
      </aside>

      <main class="editor-pane">
        <div class="editor-header">
          <span class="editor-tab active" id="editor-tab">未打开文件</span>
        </div>
        <div class="editor-body" id="editor-body">
          <div class="editor-empty">从左侧选择文件以预览内容</div>
        </div>
      </main>

      <aside class="terminal-pane">
        <div class="panel-header terminal-header">
          <span>终端</span>
          <span class="terminal-meta">
            <span id="shell-label">—</span>
            <span class="status-dot" id="terminal-status"></span>
          </span>
        </div>
        <div class="terminal-body" id="terminal"></div>
      </aside>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
