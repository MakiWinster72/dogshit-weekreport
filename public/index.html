<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>项目工作台</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <span class="topbar-title">项目工作台</span>
      <span class="topbar-path" id="project-path">—</span>
    </header>

    <div class="workspace">
      <aside class="sidebar">
        <div class="panel-header file-panel-header">
          <span>文件</span>
          <div class="tree-actions">
            <button type="button" class="tree-action-btn" id="root-create-folder" title="新建文件夹" aria-label="新建文件夹">
              <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path fill="currentColor" d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-2 8h-3v3h-2v-3h-3v-2h3V9h2v3h3v2z"/></svg>
            </button>
            <button type="button" class="tree-action-btn" id="root-create-file" title="新建文件" aria-label="新建文件">
              <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path fill="currentColor" d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm4 18H6V4h7v5h5v11zm-3-7h-2v-2h-2v2H9v2h2v2h2v-2h2v-2z"/></svg>
            </button>
          </div>
        </div>
        <div class="file-tree" id="file-tree"></div>
        <div class="theme-toggles" title="按 Alt+T 快捷切换主题">
          <button type="button" class="theme-circle theme-dark active" data-theme="dark" aria-label="VS Code Dark"></button>
          <button type="button" class="theme-circle theme-light" data-theme="light" aria-label="GitHub Light"></button>
          <button type="button" class="theme-circle theme-one-dark" data-theme="one-dark" aria-label="One Dark Pro"></button>
          <span class="theme-hint">Alt+T</span>
        </div>
      </aside>

      <main class="editor-pane">
        <div class="editor-header">
          <span class="editor-tab active" id="editor-tab">未打开文件</span>
          <div class="editor-toolbar hidden" id="editor-toolbar">
            <div class="editor-mode-switch">
              <button type="button" class="editor-mode-btn active" id="editor-mode-view">查看</button>
              <button type="button" class="editor-mode-btn" id="editor-mode-edit">编辑</button>
            </div>
            <button type="button" class="editor-save-btn" id="editor-save" disabled>保存</button>
          </div>
        </div>
        <div class="editor-body" id="editor-body">
          <div class="editor-empty">从左侧选择文件以预览内容</div>
        </div>
      </main>

      <aside class="terminal-pane">
        <div class="panel-header terminal-header">
          <span>终端</span>
          <span class="terminal-meta">
            <span id="shell-label">—</span>
            <span class="status-dot" id="terminal-status"></span>
          </span>
        </div>
        <div class="terminal-body" id="terminal"></div>
      </aside>
    </div>
  </div>

  <div class="create-dialog hidden" id="confirm-dialog">
    <div class="create-dialog-card">
      <div class="create-dialog-title" id="confirm-title">确认删除</div>
      <div class="confirm-dialog-message" id="confirm-message"></div>
      <div class="create-dialog-actions">
        <button type="button" class="create-dialog-btn" id="confirm-cancel">取消</button>
        <button type="button" class="create-dialog-btn danger" id="confirm-ok">删除</button>
      </div>
    </div>
  </div>

  <div class="create-dialog hidden" id="create-dialog">
    <form class="create-dialog-card" id="create-form">
      <div class="create-dialog-title" id="create-title">新建</div>
      <input class="create-dialog-input" id="create-input" type="text" autocomplete="off" spellcheck="false">
      <div class="create-dialog-error" id="create-error"></div>
      <div class="create-dialog-actions">
        <button type="button" class="create-dialog-btn" id="create-cancel">取消</button>
        <button type="submit" class="create-dialog-btn primary">创建</button>
      </div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
  <script src="/file-icons.js"></script>
  <script src="/app.js"></script>
</body>
</html>
